apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: test-argocd-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:korrezm/simple-app-argocd.git
    targetRevision: main
    path: charts/test-argocd-app
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  syncOptions:
  - CreateNamespace=true