apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.service.name }}
  labels:
    app: {{ .Values.service.name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.service.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.service.name }}
    spec:
      containers:
      - name: {{ .Values.service.name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        command: ["node", "/app/index.js"]
        workingDir: /app
        volumeMounts:
        - name: app-code
          mountPath: /app
        ports:
        - containerPort: 3000
      volumes:
      - name: app-code
        configMap:
          name: {{ .Values.service.name }}-code